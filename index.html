<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWC Ultimate Prospecting & Logistics</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        #auth-container, #app-container, #logistics-container { width: 100%; max-width: 600px; background: #2d2d2d; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); box-sizing: border-box; margin-bottom: 20px; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #444; border-radius: 6px; background: #1a1a1a; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #b02a37; color: white; }
        .btn-nav { background: #444; color: #fff; margin-bottom: 15px; }
        canvas { width: 100%; height: auto; border: 2px solid #444; margin-top: 10px; background: #000; cursor: crosshair; }
        #info, #build-strategy { margin-top: 15px; padding: 10px; background: #1a1a1a; border-radius: 6px; border-left: 4px solid #007bff; }
        .log-box { background: #3d3d3d; border: 1px dashed #666; padding: 10px; margin-bottom: 15px; border-radius: 6px; }
        #user-bar { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 15px; }
        ul { padding: 0; list-style: none; }
    </style>
</head>
<body>

<div id="auth-container">
    <h2>SWC Solver Login</h2>
    <input type="email" id="email" placeholder="E-Mail">
    <input type="password" id="password" placeholder="Passwort">
    <button class="btn-primary" id="login-btn">Login</button>
</div>

<!-- Navigation -->
<div id="nav-bar" class="hidden" style="width: 100%; max-width: 600px;">
    <button class="btn-nav" onclick="showView('scan')">🛰️ Prospecting (Suche)</button>
    <button class="btn-nav" onclick="showView('logistics')">🏗️ Logistik (Stationen)</button>
</div>

<!-- VIEW: PROSPECTING -->
<div id="app-container" class="hidden">
    <div id="user-bar"><span id="display-user"></span> <a href="#" id="logout-btn" style="color: #ff4d4d; text-decoration: none;">Abmelden</a></div>
    <div class="log-box">
        <textarea id="swc-bulk-log" rows="3" placeholder="SWC Log-Liste hier einfügen..."></textarea>
        <button class="btn-primary" onclick="parseBulkLog()">Importieren</button>
    </div>
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <button id="mode-scan" class="btn-primary" onclick="setMode('scan')">Modus: Scan</button>
        <button id="mode-depot" class="btn-success" style="opacity:0.5" onclick="setMode('depot')">Modus: Depot</button>
    </div>
    <canvas id="grid" width="600" height="600"></canvas>
    <div id="info">Lade Daten...</div>
    <button class="btn-danger" onclick="resetCloud()">Alles zurücksetzen</button>
</div>

<!-- VIEW: LOGISTICS -->
<div id="logistics-container" class="hidden">
    <h3>Stations-Bau-Planer</h3>
    <input type="number" id="ship-cap" placeholder="Schiffskapazität m³" value="100000">
    <div class="log-box">
        <label>Station hinzufügen:</label>
        <select id="station-template">
            <option value="Trading Hub|700000">Trading Hub (700k m³)</option>
            <option value="Refinery|400000">Refinery (400k m³)</option>
            <option value="Storage Depot|150000">Storage Depot (150k m³)</option>
        </select>
        <button class="btn-success" onclick="addStationToQueue()">Hinzufügen</button>
    </div>
    <ul id="station-list"></ul>
    <button class="btn-primary" onclick="optimizeBuildOrder()">Beste Reihenfolge berechnen</button>
    <div id="build-strategy">Noch keine Projekte geplant.</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // --- DEINE KONFIGURATION HIER ---
    const firebaseConfig = {
        apiKey: "DEIN_API_KEY",
        authDomain: "DEIN_PROJEKT.firebaseapp.com",
        projectId: "DEIN_PROJEKT",
        storageBucket: "DEIN_PROJEKT.appspot.com",
        messagingSenderId: "DEINE_ID",
        appId: "DEINE_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let measurements = [];
    let depots = [];
    let buildQueue = [];
    let mode = 'scan';
    const gridSize = 20;
    const canvas = document.getElementById('grid');
    const ctx = canvas.getContext('2d');

    // UI NAVIGATION
    window.showView = (view) => {
        document.getElementById('app-container').classList.toggle('hidden', view !== 'scan');
        document.getElementById('logistics-container').classList.toggle('hidden', view !== 'logistics');
    };

    // AUTH
    document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
    });
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    onAuthStateChanged(auth, (user) => {
        const isAuth = !!user;
        document.getElementById('auth-container').classList.toggle('hidden', isAuth);
        document.getElementById('nav-bar').classList.toggle('hidden', !isAuth);
        document.getElementById('app-container').classList.toggle('hidden', !isAuth);
        if(isAuth) {
            document.getElementById('display-user').innerText = user.email;
            listenToCloud(user.uid);
        }
    });

    // PROSPECTING LOGIC
    window.setMode = (m) => {
        mode = m;
        document.getElementById('mode-scan').style.opacity = m === 'scan' ? '1' : '0.5';
        document.getElementById('mode-depot').style.opacity = m === 'depot' ? '1' : '0.5';
    };

    canvas.addEventListener('click', async (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (rect.width / gridSize));
        const y = Math.floor((e.clientY - rect.top) / (rect.height / gridSize));
        
        if(mode === 'depot') {
            const exists = depots.findIndex(d => d.x === x && d.y === y);
            if(exists > -1) depots.splice(exists, 1);
            else {
                const newDepot = {x, y};
                depots.push(newDepot);
                // Auto-Cleanup: Lösche Scans, die zu diesem Depot passen
                measurements = measurements.filter(m => (Math.abs(m.x - x) + Math.abs(m.y - y)) !== m.d);
            }
            await sync();
        } else {
            // Für manuellen Modus: Alert oder Inputs füllen
            const d = prompt(`Distanz für Scan bei ${x},${y}:`);
            if(d !== null) {
                measurements.push({x, y, d: parseInt(d)});
                await sync();
            }
        }
    });

    window.parseBulkLog = async () => {
        const lines = document.getElementById('swc-bulk-log').value.split('\n');
        lines.forEach(line => {
            const coords = line.match(/(\d+)\s*,\s*(\d+)/);
            const dist = line.match(/(?:distance|of)\s*(\d+)/i);
            if(coords && dist) measurements.push({x: parseInt(coords[1]), y: parseInt(coords[2]), d: parseInt(dist[1])});
            else if(coords && line.includes('located')) depots.push({x: parseInt(coords[1]), y: parseInt(coords[2])});
        });
        await sync();
        document.getElementById('swc-bulk-log').value = "";
    };

    async function sync() {
        if(!auth.currentUser) return;
        await setDoc(doc(db, "solves", auth.currentUser.uid), { measurements, depots, buildQueue });
    }

    function listenToCloud(uid) {
        onSnapshot(doc(db, "solves", uid), (snap) => {
            if(!snap.exists()) return;
            const data = snap.data();
            measurements = data.measurements || [];
            depots = data.depots || [];
            buildQueue = data.buildQueue || [];
            render();
            updateQueueUI();
        });
    }

    function render() {
        let possible = [];
        for(let x=0; x<gridSize; x++) {
            for(let y=0; y<gridSize; y++) {
                if(measurements.every(m => (Math.abs(x-m.x) + Math.abs(y-m.y)) === m.d)) possible.push({x, y});
            }
        }

        ctx.clearRect(0,0,600,600);
        ctx.strokeStyle = "#333";
        for(let i=0; i<=gridSize; i++) {
            ctx.beginPath(); ctx.moveTo(i*30,0); ctx.lineTo(i*30,600); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*30); ctx.lineTo(600,i*30); ctx.stroke();
        }

        ctx.fillStyle = "rgba(0, 123, 255, 0.3)";
        possible.forEach(c => ctx.fillRect(c.x*30+1, c.y*30+1, 28, 28));
        
        depots.forEach(d => {
            ctx.fillStyle = "#28a745"; ctx.beginPath();
            ctx.arc(d.x*30+15, d.y*30+15, 10, 0, 7); ctx.fill();
        });

        measurements.forEach(m => {
            ctx.fillStyle = "#ffc107"; ctx.beginPath();
            ctx.arc(m.x*30+15, m.y*30+15, 5, 0, 7); ctx.fill();
        });

        // Visuelle Empfehlung (Fadenkreuz)
        const rec = getRecommendation(possible);
        if(rec) {
            ctx.strokeStyle = "#00d4ff"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(rec.x*30+15, rec.y*30+15, 12, 0, 7); ctx.stroke();
        }

        document.getElementById('info').innerHTML = `Möglichkeiten: ${possible.length} | ${rec ? 'Empfehlung: '+rec.x+','+rec.y : 'Scan nötig'}`;
    }

    function getRecommendation(possible) {
        if(possible.length <= 1 || possible.length > 100) return null;
        let best = null, minMax = Infinity;
        for(let x=0; x<gridSize; x++) {
            for(let y=0; y<gridSize; y++) {
                let counts = {};
                possible.forEach(c => {
                    let d = Math.abs(x-c.x) + Math.abs(y-c.y);
                    counts[d] = (counts[d]||0)+1;
                });
                let worst = Math.max(...Object.values(counts));
                if(worst < minMax) { minMax = worst; best = {x,y}; }
            }
        }
        return best;
    }

    // LOGISTICS LOGIC
    window.addStationToQueue = async () => {
        const val = document.getElementById('station-template').value.split('|');
        buildQueue.push({ name: val[0], volume: parseInt(val[1]) });
        await sync();
    };

    window.optimizeBuildOrder = () => {
        const cap = parseInt(document.getElementById('ship-cap').value);
        let sorted = [...buildQueue].sort((a,b) => a.volume - b.volume);
        let html = "<b>Baureihenfolge (Effizient):</b><br>";
        sorted.forEach((s, i) => {
            html += `${i+1}. ${s.name} (${Math.ceil(s.volume/cap)} Flüge)<br>`;
        });
        document.getElementById('build-strategy').innerHTML = html;
    };

    function updateQueueUI() {
        document.getElementById('station-list').innerHTML = buildQueue.map(s => `<li>🏗️ ${s.name}</li>`).join('');
    }

    window.resetCloud = async () => { if(confirm("Reset?")) await deleteDoc(doc(db, "solves", auth.currentUser.uid)); };
</script>
</body>
</html>
